<!doctype html>
<html lang="en" data-app-mode="admin">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>TotoWrap Confirm Bets Preview</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="hdr">
      <div class="hdr-day">Day 13/50 Preview</div>
      <div class="logo-3d-container admin" style="--logo-delay:-1.2s">
        <div class="logo-3d-inner">
          <img class="face front" src="imgs/totowrap.png" alt="">
          <img class="face back" src="imgs/totowrap.png" alt="">
          <img class="face top" src="imgs/totowrap.png" alt="">
          <img class="face bottom" src="imgs/totowrap.png" alt="">
        </div>
      </div>
      <div class="hdr-right">
        <div class="hdr-wrap">Wrap <span class="hdr-wrap-time live">20:00</span></div>
      </div>
    </div>

    <div class="standalone-scroll">
      <div class="card">
        <div class="card-lbl">Confirm Player Guesses</div>
        <div class="preview-card compact-preview-card">
          <div class="preview-head compact-preview-head"><span>Player</span><span>Bet</span><span>Date</span></div>

          <div class="row preview-row compact-preview-row">
            <div class="row-name">Michelangelo</div>
            <input type="text" class="bet-time-input" value="18:20" aria-label="Michelangelo bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Michelangelo bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Luca E.</div>
            <input type="text" class="bet-time-input" value="18:44" aria-label="Luca E. bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Luca E. bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Luca B.</div>
            <input type="text" class="bet-time-input" value="18:45" aria-label="Luca B. bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Luca B. bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Luigi</div>
            <input type="text" class="bet-time-input" value="19:04" aria-label="Luigi bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Luigi bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Beatrice M.</div>
            <input type="text" class="bet-time-input" value="19:22" aria-label="Beatrice M. bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Beatrice M. bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Sarah</div>
            <input type="text" class="bet-time-input" value="19:32" aria-label="Sarah bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Sarah bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Edoardo</div>
            <input type="text" class="bet-time-input" value="19:47" aria-label="Edoardo bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Edoardo bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Riccardo</div>
            <input type="text" class="bet-time-input" value="19:48" aria-label="Riccardo bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Riccardo bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Valentina</div>
            <div class="badge b-missing">This tuna forgot to bet today</div>
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Giulia</div>
            <input type="text" class="bet-time-input" value="19:56" aria-label="Giulia bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Giulia bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Alex</div>
            <input type="text" class="bet-time-input" value="20:03" aria-label="Alex bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Alex bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Daniela</div>
            <input type="text" class="bet-time-input" value="20:11" aria-label="Daniela bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Daniela bet date">
          </div>
          <div class="row preview-row compact-preview-row">
            <div class="row-name">Marco</div>
            <input type="text" class="bet-time-input" value="20:19" aria-label="Marco bet time">
            <input type="text" class="bet-date-input" value="05 giu 2026" aria-label="Marco bet date">
          </div>
        </div>
        <p class="mono dim" style="font-size:.7rem;margin-top:10px">
          12 players submitted · 1 missing<br>
          <span style="color:var(--green)">+ 1 new player(s) will be added to the roster</span>
        </p>
      </div>
      <button class="btn btn-p">✓ Looks Good — Start Day</button>
      <button class="btn btn-s">Go Back</button>
    </div>
  </div>
</body>
</html>
